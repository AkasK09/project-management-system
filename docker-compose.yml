version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: projectflow_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: securepassword123
      POSTGRES_DB: project_management
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: projectflow_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DATABASE_URL=postgresql://postgres:securepassword123@db:5432/project_management?schema=public
      - JWT_SECRET=supersecretjwtkey
      - JWT_EXPIRES_IN=1d
    depends_on:
      - db
    command: sh -c "npx prisma db push && npm start"

  frontend:
    build: ./frontend
    container_name: projectflow_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:5000/api
    depends_on:
      - backend

volumes:
  pgdata:
